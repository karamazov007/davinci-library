<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Minimum Viable Personality</title><style>

 // ovKey builds the stable path; returns override text if present else base.
 function ovGet(path,base){return Object.prototype.hasOwnProperty.call(OVR,path)?OVR[path]:base;}

 // Editable-attribute helper: adds data-ov + (when editing) contenteditable.

 // path builders

 // user topics store: mvp.usertopics.<tab> = JSON array of {id,name,blurb,blocks:[]}

 function getUserTopics(tabId){var v=getLS(utKey(tabId));if(!v)return [];try{var a=JSON.parse(v);return Array.isArray(a)?a:[];}catch(e){return [];}}

 function slugify(s){return (s||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"")||("t"+Date.now());}
 // merged topics for a tab (built-in first, then user); tags user ones with _user.
 function topicsFor(t){
   var base=(t.topics||[]).map(function(tp){return tp;});

   return base.concat(us);

 function getAddBlocks(tabId,topId){var v=getLS(abKey(tabId,topId));if(!v)return [];try{var a=JSON.parse(v);return Array.isArray(a)?a:[];}catch(e){return [];}}
 function saveAddBlocks(tabId,topId,arr){setLS(abKey(tabId,topId),JSON.stringify(arr||[]));}

 function blocksFor(t,topic){

 var _uidc=0;

 function getWorkOrder(){return WORK_ORDER;}

 function itemKeyTopic(it){return it.tab.id+"."+it.topic.id;}
 function itemKeyTask(tk){return "task."+tk.id;}
 // Unified key for mixed (topic + standalone task) groups.
 function itemKeyAny(it){return it._kind==="task"?itemKeyTask(it):itemKeyTopic(it);}
 // Sort an array by the saved order for a group; items not present keep natural order at the end.
 function applyOrder(groupId,arr,keyFn){
   var ord=(getWorkOrder()||{})[groupId];
   if(!ord||!ord.length)return arr;
   var pos={};ord.forEach(function(k,i){pos[k]=i;});
   return arr.slice().sort(function(a,b){
     var ka=keyFn(a),kb=keyFn(b);
     var pa=(ka in pos)?pos[ka]:Infinity, pb=(kb in pos)?pos[kb]:Infinity;
     if(pa!==pb)return pa-pb;
     return 0; // preserve incoming order for ties
   });
 }

 function figBlock(b){
   var svg=gen(b.gen,b.args);
   var vbw=0;
   var mvb=/viewBox\s*=\s*["'][^"']*?([\d.]+)\s+([\d.]+)\s*["']/.exec(svg); // last two numbers = w h
   if(mvb){vbw=parseFloat(mvb[1])||0;}
   // fallback: explicit width attr
   if(!vbw){var mw=/<svg[^>]*\swidth\s*=\s*["']?([\d.]+)/.exec(svg);if(mw)vbw=parseFloat(mw[1])||0;}
   if(!vbw)vbw=720;
   // Set the svg to render at its natural width (min-width) so wide diagrams overflow & pan;
   // width:100% would shrink it. Cap natural width so small diagrams don't force-scroll.
   var minw=Math.round(vbw);
   svg=svg.replace(/<svg\b/,'<svg style="min-width:'+minw+'px;width:100%;max-width:none"');
   return '<figure class="fig"><div class="figscroll">'+svg+'</div>'
     +'<div class="fighint">drag / scroll to explore</div>'
     +(b.cap?'<figcaption>'+esc(b.cap)+'</figcaption>':'')+'</figure>';
 }

 // ---- On Work: live to-do board driven by the shared status store ----
 function collectStatusTopics(){
   var out=[];
   TABS.forEach(function(t){
     if(t.id==="work")return; // the board itself is not a source
     (t.topics||[]).forEach(function(tp){
       if(!tp.status)return;
       var st=getStatus(t.id,tp.id,tp.status);
       var pr=getPrio(t.id,tp.id,tp.priority||"high");
       out.push({tab:t,topic:tp,status:st,prio:pr});
     });
   });
   return out;
 }
 function workRow(it,groupId){
   var done=it.status==="completed";
   var key=itemKeyTopic(it);
   return '<div class="wrow'+(done?" done":"")+'" draggable="true" data-key="'+esc(key)+'" data-group="'+esc(groupId)+'">'
     +'<span class="whandle" aria-hidden="true" title="Drag to reorder">\u283f</span>'
     +'<input type="checkbox" class="wcb" data-wtab="'+esc(it.tab.id)+'" data-wtopic="'+esc(it.topic.id)+'"'+(done?" checked":"")+'>'
     +'<span class="wlabel" data-jtab="'+esc(it.tab.id)+'" data-jtopic="'+esc(it.topic.id)+'">'
       +'<b>'+esc(it.topic.name)+'</b><span class="wfrom"> · '+esc(it.tab.name)+'</span></span>'
     +'</div>';
 }
 function taskRow(tk,groupId){
   var done=getTaskDone(tk.id);
   var key=itemKeyTask(tk);
   return '<div class="wrow'+(done?" done":"")+'" draggable="true" data-key="'+esc(key)+'" data-group="'+esc(groupId)+'">'
     +'<span class="whandle" aria-hidden="true" title="Drag to reorder">\u283f</span>'
     +'<input type="checkbox" class="wtaskcb" data-taskid="'+esc(tk.id)+'"'+(done?" checked":"")+'>'
     +'<span class="wlabel'+(tk.go?" jump":"")+'"'+(tk.go?' data-jtab="'+esc(tk.go)+'"'+(tk.goSel?' data-jtopic="'+esc(tk.goSel)+'"':''):'')+'>'
       +'<b>'+esc(tk.name)+'</b>'+(tk.from?'<span class="wfrom"> · '+esc(tk.from)+'</span>':'')+'</span>'
     +'</div>';
 }
 // ---- On Work: selected-group persistence ----
 var WORK_GROUP_KEY="mvp.work.group";
 function getWorkGroupSel(){return getLS(WORK_GROUP_KEY)||"";}
 function setWorkGroupSel(g){setLS(WORK_GROUP_KEY,g);}
 // Compute every group's rows + counts for the current status/task store.
 function computeWorkGroups(t){
   var items=collectStatusTopics();
   var active=items.filter(function(x){return x.status==="active";});
   var actHigh=items.filter(function(x){return x.status==="action"&&x.prio==="high";});
   var actLow=items.filter(function(x){return x.status==="action"&&x.prio==="low";});
   var done=items.filter(function(x){return x.status==="completed";});
   function byName(a,b){return a.topic.name<b.topic.name?-1:1;}
   function rowName(x){return x._kind==="task"?x.name:x.topic.name;}
   function byName2(a,b){return rowName(a)<rowName(b)?-1:1;}
   [active,actHigh,actLow,done].forEach(function(a){a.sort(byName);});
   // Mark topic rows so mixed groups can render the correct row kind.
   [active,actHigh,actLow,done].forEach(function(a){a.forEach(function(x){x._kind="topic";});});
   // Standalone tasks are ongoing personal habits: they live in the normal groups.
   // Not-done -> Active now; done -> Completed. Their done-state persists via mvp.task.<id>.
   (t.standalone||[]).forEach(function(tk){
     var row={id:tk.id,name:tk.name,from:tk.from,go:tk.go,goSel:tk.goSel,_kind:"task",_task:tk};
     if(getTaskDone(tk.id))done.push(row);else active.push(row);
   });
   // Keep name-sorted after merging tasks in.
   [active,done].forEach(function(a){a.sort(byName2);});
   // apply persisted per-group ordering (mixed key handles both topic + task rows)
   active =applyOrder("active", active, itemKeyAny);
   actHigh=applyOrder("actHigh",actHigh,itemKeyAny);
   actLow =applyOrder("actLow", actLow, itemKeyAny);
   done   =applyOrder("done",   done,   itemKeyAny);
   return [
     {id:"active", title:"Active now",          accent:"#16a34a", dot:"active",    items:active},
     {id:"actHigh",title:"Action items · High", accent:"#ea580c", dot:"action",    items:actHigh},
     {id:"actLow", title:"Action items · Low",  accent:"#0891b2", dot:"action",    items:actLow},
     {id:"done",   title:"Completed",           accent:"#64748b", dot:"completed", items:done}
   ];
 }
 function renderWork(t){
   var groups=computeWorkGroups(t);
   // pick selected group: persisted, else first non-empty starting at Action·High, else Active now
   var sel=getWorkGroupSel();
   var byId={}; groups.forEach(function(g){byId[g.id]=g;});
   if(!sel||!byId[sel]){
     sel=(byId.actHigh&&byId.actHigh.items.length)?"actHigh":"active";
   }
   var cur=byId[sel]||groups[0];
   // Left panel: group entries with live counts (standard .tbtn styling)
   var nav='<div class="nl">'+esc(t.name)+'</div>'+groups.map(function(g){
     return '<button class="tbtn'+(g.id===cur.id?" active":"")+'" data-wgroup="'+esc(g.id)+'">'
       +'<b>'+esc(g.title)+'</b><span>'+g.items.length+(g.items.length===1?" item":" items")+'</span>'
       +'<span class="dot dot-'+esc(g.dot)+'"></span></button>';
   }).join("");
   // Main: only the selected group's rows
   var rows=cur.items.map(function(x){
     return x._kind==="task"?taskRow(x,cur.id):workRow(x,cur.id);
   });
   var groupBody;
   if(rows.length){
     groupBody='<div class="wgroup'+(cur.id==="done"?" wdone":"")+'" data-group="'+esc(cur.id)+'">'
       +'<div class="wgh"><span class="wgt" style="color:'+cur.accent+'">'+esc(cur.title)+'</span>'
       +'<span class="wgc">'+rows.length+'</span></div>'+rows.join("")+'</div>';
   } else {
     groupBody='<div class="wgroup" data-group="'+esc(cur.id)+'">'
       +'<div class="wgh"><span class="wgt" style="color:'+cur.accent+'">'+esc(cur.title)+'</span>'
       +'<span class="wgc">0</span></div>'
       +'<p class="bp" style="color:var(--dim)">Nothing in this group yet.</p></div>';
   }
   var intro=t.intro?('<p class="wintro">'+esc(t.intro)+'</p>'):'';
   var main='<div class="nmain-in wboard"><div class="thead"><h1>'+esc(t.name)+'</h1>'
     +'<p>Your live to-do — checking an item marks its source Completed. Click a name to jump to it.</p></div>'
     +intro+groupBody+'</div>';
   return '<div class="nlayout"><nav class="nnav" id="nnav">'+nav+'</nav>'
     +'<main class="nmain" id="nmain">'+main+'</main></div>';
 }

    function renderTab(t){
  var all=topicsFor(t);
  var cur=SEL[t.id]||all[0].id;
  if(!all.some(function(tp){return tp.id===cur;}))cur=all[0].id;
  var topic=all.filter(function(tp){return tp.id===cur;})[0];
  var nav='<div class="nl">'+esc(t.name)+'</div>'+all.map(function(tp){
    var nm=ovGet(pTopic(t.id,tp.id,"name"),tp.name);
    var bl=ovGet(pTopic(t.id,tp.id,"blurb"),tp.blurb||"");
    var cls="tbtn"+(tp.id===cur?" active":"");
    // In edit mode the name (and blurb, if shown) become contentEditable writing to the SAME
    // __name/__blurb override path used by the content header. Use a <div role=button> so the
    // nested contentEditable stays reliably editable (a real <button> swallows caret placement).
    var inner='<b'+ea(pTopic(t.id,tp.id,"name"))+'>'+esc(nm)+'</b>'
      +((bl||editMode)?'<span'+ea(pTopic(t.id,tp.id,"blurb"))+'>'+esc(bl)+'</span>':'')
      +dotFor(t,tp)
      +(tp._user?'<button class="delcat" type="button" data-delcat="'+esc(tp.id)+'" title="Delete category">\u2715</button>':'');
    return editMode
      ? '<div class="'+cls+'" role="button" tabindex="0" data-topic="'+esc(tp.id)+'">'+inner+'</div>'
      : '<button class="'+cls+'" data-topic="'+esc(tp.id)+'">'+inner+'</button>';
  }).join("");
  // "+ Add category" (skip the auto-generated On Work board; renderWork handles work)
  if(editMode)nav+='<button class="addcat" type="button" id="addcatbtn">+ Add category</button>';
  var ctx={h:0,toc:[]};
  var tname=ovGet(pTopic(t.id,topic.id,"name"),topic.name);
  var tblurb=ovGet(pTopic(t.id,topic.id,"blurb"),topic.blurb||"");
  var body=blocksFor(t,topic).map(function(b,bi){
    // user-added blocks key their text by stable uid; built-in blocks by index
    var P=b._user?(t.id+"."+topic.id+".u."+b._uid):(t.id+"."+topic.id+"."+bi);
    var inner=block(b,ctx,P);
    if(inner==="")return "";
    if(!editMode)return inner; // read-only: emit block exactly as before (no wrapper)
    var del=b._user?'<button class="delblk" type="button" data-delblk="'+esc(b._uid)+'" title="Delete block">\u2715</button>':'';
    return '<div class="blockwrap">'+del+inner+'</div>';
  }).join("");
  // add-block controls (edit mode)
  var addblocks=editMode?'<div class="addblocks"><button class="addblk" type="button" data-addblk="p">+ Paragraph</button><button class="addblk" type="button" data-addblk="h">+ Heading</button></div>':'';
  var toc=ctx.toc.length?('<div class="tl">On this page</div>'+ctx.toc.map(function(x){return '<a data-to="'+x[0]+'">'+esc(x[1])+'</a>';}).join("")):'';
  var main='<div class="nmain-in"><div class="thead"><h1'+ea(pTopic(t.id,topic.id,"name"))+'>'+esc(tname)+'</h1>'+((tblurb||editMode)?'<p'+ea(pTopic(t.id,topic.id,"blurb"))+'>'+esc(tblurb)+'</p>':'')+'</div>'+chipHTML(t,topic)+body+addblocks+'</div>';
  return '<div class="nlayout"><nav class="nnav" id="nnav">'+nav+'</nav><main class="nmain" id="nmain">'+main+'</main><aside class="ntoc" id="ntoc">'+toc+'</aside></div>';
 }

 function applyEditClass(){try{document.body.classList[editMode?"add":"remove"]("editing");var ep=document.getElementById("editpill");if(ep){ep.classList[editMode?"add":"remove"]("on");ep.textContent=editMode?"\u2713 Editing":"\u270e Edit";}}catch(_){}}
 function renderCurrent(){var T=tabById(tab);stage.innerHTML=(T.id==="work")?renderWork(T):renderTab(T);applyEditClass();}
 function show(id){ tab=id; setLS(TK,id); renderTabs(); renderCurrent(); }
 stage.addEventListener("click",function(e){var t=e.target;
   // click-to-open accordion (works in and out of edit mode)
   var acch=t.closest?t.closest(".acc-head"):null; if(acch){acch.parentNode.classList.toggle("open");return;}
   // ==== EDIT MODE affordances (checked first) ====
   // delete a user-added category
   var dc=t.closest?t.closest("[data-delcat]"):null; if(dc){
     e.stopPropagation();
     var T0=tabById(tab), tid=dc.getAttribute("data-delcat");
     var arr=getUserTopics(T0.id).filter(function(x){return x.id!==tid;});
     saveUserTopics(T0.id,arr);
     if(SEL[T0.id]===tid){delete SEL[T0.id];setLS("mvp.sel",JSON.stringify(SEL));}
     renderCurrent(); return;
   }
   // delete a user-added block
   var db=t.closest?t.closest("[data-delblk]"):null; if(db){
     e.stopPropagation();
     var Tb=tabById(tab), tpid=(SEL[Tb.id]||topicsFor(Tb)[0].id), uid=db.getAttribute("data-delblk");
     var barr=getAddBlocks(Tb.id,tpid).filter(function(x){return x._uid!==uid;});
     saveAddBlocks(Tb.id,tpid,barr);
     renderCurrent(); return;
   }
   // add a block (paragraph / heading)
   var ab=t.closest?t.closest("[data-addblk]"):null; if(ab){
     var Ta=tabById(tab), tpa=(SEL[Ta.id]||topicsFor(Ta)[0].id), kind=ab.getAttribute("data-addblk");
     var arr2=getAddBlocks(Ta.id,tpa);
     arr2.push({t:kind, x:(kind==="h"?"New heading":"New paragraph — click to edit."), _uid:newUid()});
     saveAddBlocks(Ta.id,tpa,arr2);
     if(!editMode){editMode=true;setLS(EDIT_KEY,"true");}
     renderCurrent(); return;
   }
   // "+ Add category" -> inline input form
   var acb=t.closest?t.closest("#addcatbtn"):null; if(acb){
     var nav=acb.parentNode;
     var f=document.createElement("form"); f.className="addcatform"; f.id="addcatform";
     f.innerHTML='<input type="text" id="addcatinput" placeholder="Category name" autocomplete="off"><button type="submit">Add</button>';
     nav.replaceChild(f,acb);
     var inp=f.querySelector("#addcatinput"); if(inp)inp.focus();
     return;
   }

   // On Work: left-panel group selection -> persist + re-render
   var wg=t.closest?t.closest("[data-wgroup]"):null; if(wg){
     setWorkGroupSel(wg.getAttribute("data-wgroup"));
     renderCurrent(); return;
   }
   // On Work: topic checkbox toggle -> flip status completed<->action, persist, re-render
   var wcb=t.closest?t.closest(".wcb"):null; if(wcb){
     var wt=wcb.getAttribute("data-wtab"), wtp=wcb.getAttribute("data-wtopic");
     var newst=wcb.checked?"completed":"action";
     setLS(skey(wt,wtp),newst);
     renderCurrent(); return;
   }
   // On Work: standalone task checkbox
   var tcb=t.closest?t.closest(".wtaskcb"):null; if(tcb){
     setTaskDone(tcb.getAttribute("data-taskid"),tcb.checked);
     renderCurrent(); return;
   }
   // On Work: click a name label -> jump to its source tab + topic (checkbox/handle handled above)
   var jmp=t.closest?t.closest("[data-jtab]"):null; if(jmp){
     var jt=jmp.getAttribute("data-jtab"), jtp=jmp.getAttribute("data-jtopic");
     if(jtp){SEL[jt]=jtp;setLS("mvp.sel",JSON.stringify(SEL));}
     show(jt);
     // scroll to top of the newly rendered content
     try{var nm=stage.querySelector(".nmain");if(nm)nm.scrollTop=0;}catch(_){}
     try{window.scrollTo(0,0);}catch(_){}
     return;
   }
   var cs=t.closest?t.closest("[data-status]"):null; if(cs){setLS(skey(tab,cs.getAttribute("data-topic")),cs.getAttribute("data-status"));renderCurrent();return;}
   var cpr=t.closest?t.closest("[data-prio]"):null; if(cpr){setLS(pkey(tab,cpr.getAttribute("data-topic")),cpr.getAttribute("data-prio"));renderCurrent();return;}
   var toc=t.closest?t.closest("[data-to]"):null; if(toc){var el=document.getElementById(toc.getAttribute("data-to"));if(el)el.scrollIntoView({behavior:"smooth",block:"start"});return;}
   var go=t.closest?t.closest("[data-goto]"):null; if(go){show(go.getAttribute("data-goto"));return;}
   // edit mode: clicking on an editable label edits its text (never navigates). Selecting a
   // topic still works by clicking the button's non-text area (padding / dot).
   if(editMode){ var ovt=t.closest?t.closest("[data-ov]"):null; if(ovt){ return; } }
   var tp=t.closest?t.closest("[data-topic]"):null; if(tp){var T=tabById(tab);SEL[T.id]=tp.getAttribute("data-topic");setLS("mvp.sel",JSON.stringify(SEL));renderCurrent();return;}
 });

 // ---- add-category form submit ----
 stage.addEventListener("submit",function(e){
   var f=e.target.closest?e.target.closest("#addcatform"):null; if(!f)return;
   e.preventDefault();
   var inp=f.querySelector("#addcatinput"); var name=(inp&&inp.value||"").trim();
   if(!name){renderCurrent();return;}
   var T=tabById(tab);
   var arr=getUserTopics(T.id);
   var base=slugify(name); var id=base; var n=1;
   var taken={}; topicsFor(T).forEach(function(x){taken[x.id]=1;});
   while(taken[id]){id=base+"-"+(++n);}
   arr.push({id:id,name:name,blurb:"",blocks:[{t:"p",x:"Start writing here\u2026",_uid:newUid(),_user:true}]});
   saveUserTopics(T.id,arr);
   SEL[T.id]=id; setLS("mvp.sel",JSON.stringify(SEL));
   if(!editMode){editMode=true;setLS(EDIT_KEY,"true");}
   renderCurrent(); return;
 });
 // ---- edit toggle pill ----
 (function(){var ep=document.getElementById("editpill"); if(ep)ep.addEventListener("click",function(){
   editMode=!editMode; setLS(EDIT_KEY,editMode?"true":"false"); renderCurrent();
 });})();
 // ---- capture edits on any [data-ov] element ----
 function captureEdit(el){
   if(!el||!el.getAttribute)return;
   var path=el.getAttribute("data-ov"); if(!path)return;
   var txt=el.textContent;
   var Tn=tabById(tab);
   // parse path: <tab>.<topic>.__name | __blurb | .u.<uid>.<field...> | .<bi>.<field...>
   var parts=path.split(".");
   var field3=parts[2];
   if(field3==="__name"||field3==="__blurb"){
     // topic name/blurb override; also mirror onto user topics so left panel reflects immediately
     ovSet(path,txt);
     var tp=parts[1];
     var us=getUserTopics(Tn.id); var changed=false;
     us.forEach(function(u){ if(u.id===tp){ if(field3==="__name"){u.name=txt;} else {u.blurb=txt;} changed=true; }});
     if(changed)saveUserTopics(Tn.id,us);
     return;
   }
   if(field3==="u"){
     // user-added block: parts = [tab,topic,"u",uid,field,(sub)]
     var tp2=parts[1], uid=parts[3], field=parts[4], sub=(parts.length>5?parts[5]:null);
     var barr=getAddBlocks(Tn.id,tp2); var b=null;
     for(var i=0;i<barr.length;i++){if(barr[i]._uid===uid){b=barr[i];break;}}
     if(b){ b.x=txt; saveAddBlocks(Tn.id,tp2,barr); }
     ovSet(path,txt); // also keep override for consistency
     return;
   }
   // built-in block field -> plain override
   ovSet(path,txt);
 }
 stage.addEventListener("input",function(e){var el=e.target.closest?e.target.closest("[data-ov]"):null; if(el)captureEdit(el);});
 stage.addEventListener("blur",function(e){var el=e.target.closest?e.target.closest("[data-ov]"):null; if(el){captureEdit(el);
   // name/blurb edits: re-render (after focus leaves) so nav label + content header stay consistent
   var p=el.getAttribute("data-ov")||""; if(/\.__(name|blurb)$/.test(p)) setTimeout(function(){ if(!isEditingNow()) renderCurrent(); },0);
 }},true);
 // ---- On Work: drag-to-reorder (mouse HTML5 DnD + touch fallback) ----
 function groupContainer(groupId){
   return stage.querySelector('.wgroup[data-group="'+groupId+'"]');
 }
 // Recompute a group's order array from current DOM row order and persist it.
 function saveGroupOrderFromDOM(groupId){
   var g=groupContainer(groupId); if(!g)return;
   var keys=[];
   g.querySelectorAll('.wrow[data-key]').forEach(function(r){keys.push(r.getAttribute("data-key"));});
   var o=getWorkOrder(); o[groupId]=keys; saveWorkOrder(o);
 }
 // Given a container and the pointer Y, find the row we should insert before (null = append).
 function rowAfterPoint(container,y){
   var rows=[].slice.call(container.querySelectorAll('.wrow:not(.dragging)'));
   for(var i=0;i<rows.length;i++){
     var box=rows[i].getBoundingClientRect();
     if(y < box.top+box.height/2) return rows[i];
   }
   return null;
 }
 var dragRow=null;
 stage.addEventListener("dragstart",function(e){
   var r=e.target.closest?e.target.closest(".wrow[draggable]"):null;
   if(!r)return;
   dragRow=r; r.classList.add("dragging");
   try{e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain",r.getAttribute("data-key")||"");}catch(_){}
 });
 stage.addEventListener("dragover",function(e){
   if(!dragRow)return;
   var g=e.target.closest?e.target.closest(".wgroup[data-group]"):null;
   if(!g||g!==dragRow.parentNode)return; // only reorder within the same group
   e.preventDefault();
   try{e.dataTransfer.dropEffect="move";}catch(_){}
   var after=rowAfterPoint(g,e.clientY);
   if(after==null)g.appendChild(dragRow);
   else g.insertBefore(dragRow,after);
 });
 stage.addEventListener("drop",function(e){
   if(!dragRow)return;
   e.preventDefault();
   var gid=dragRow.getAttribute("data-group");
   dragRow.classList.remove("dragging");
   if(gid)saveGroupOrderFromDOM(gid);
   dragRow=null;
 });
 stage.addEventListener("dragend",function(){
   if(dragRow){dragRow.classList.remove("dragging");dragRow=null;}
 });
 // Touch / trackpad fallback via the handle.
 var tDrag=null,tGroup=null,tMoved=false;
 stage.addEventListener("touchstart",function(e){
   var h=e.target.closest?e.target.closest(".whandle"):null;
   if(!h)return;
   var r=h.closest(".wrow[draggable]"); if(!r)return;
   tDrag=r; tGroup=r.parentNode; tMoved=false;
   r.classList.add("dragging");
 },{passive:false});
 stage.addEventListener("touchmove",function(e){
   if(!tDrag)return;
   e.preventDefault();
   tMoved=true;
   var y=e.touches[0].clientY;
   var after=rowAfterPoint(tGroup,y);
   if(after==null)tGroup.appendChild(tDrag);
   else tGroup.insertBefore(tDrag,after);
 },{passive:false});
 stage.addEventListener("touchend",function(){
   if(!tDrag)return;
   tDrag.classList.remove("dragging");
   if(tMoved){var gid=tDrag.getAttribute("data-group");if(gid)saveGroupOrderFromDOM(gid);}
   tDrag=null;tGroup=null;tMoved=false;
 });
 // expose for verification harness
 try{window.__mvpSaveGroupOrderFromDOM=saveGroupOrderFromDOM;}catch(_){}
 renderTabs(); show(tab);
 // lazy-load Firebase AFTER first render so a slow/blocked CDN never stalls the UI;
 // falls back silently to MEM + localStorage.
 try{ mvpInitFirebase(); }catch(e){}
 // expose for verification harness
 try{window.__mvpCollectUserData=collectUserData;window.__mvpIsUserKey=isUserKey;}catch(_){}
})();
