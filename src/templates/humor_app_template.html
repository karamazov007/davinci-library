<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Humor Development</title><style>
:root{--bg:#f6f7f9;--surface:#fff;--ink:#1c2431;--dim:#5b6572;--line:#e7e9ee;--line2:#dcdfe6;--accent:#4f46e5;--soft:#eef0fb;--gold:#caa24a}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
.happ{display:flex;flex-direction:column;height:100vh}
.hbar{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;flex-wrap:wrap}
.hbrand{font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px;white-space:nowrap;margin-right:6px}
.htabs{display:flex;gap:3px;flex-wrap:wrap}
.htabs button{border:0;background:none;color:var(--dim);font:inherit;font-size:13px;font-weight:650;padding:8px 13px;border-radius:9px;cursor:pointer;white-space:nowrap}
.htabs button:hover{background:var(--soft);color:var(--ink)}
.htabs button.active{background:var(--accent);color:#fff}
.stage{flex:1;min-height:0;overflow:auto;position:relative}
.stage.embed{overflow:hidden}
.frame{width:100%;height:100%;border:0;display:block;background:#fff}
/* ---- prose + figures ---- */
.mlayout{display:flex;gap:30px;align-items:flex-start;max-width:1180px;margin:0 auto;padding:30px 34px 90px}
.mmain{flex:1;min-width:0}
.mtoc{flex:0 0 200px;position:sticky;top:16px;align-self:flex-start;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:10px 8px;max-height:calc(100vh - 90px);overflow:auto;box-shadow:0 1px 2px rgba(20,25,40,.04)}
.mtoc .tl{font-size:10.5px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);padding:7px 10px 9px}
.mtoc a{display:block;padding:6px 10px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--ink);text-decoration:none;cursor:pointer;line-height:1.3}
.mtoc a:hover{background:var(--soft);color:var(--accent)}
.hero{margin:4px 0 10px}
.hero .kick{font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.hero h1{font-size:32px;font-weight:850;letter-spacing:-.02em;margin:8px 0 6px;line-height:1.08}
.hero p.sub{font-size:16px;color:var(--dim);line-height:1.6;max-width:720px;margin:0}
.sec{scroll-margin-top:16px;margin-top:44px}
.sec>.eyebrow{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:10px}
.sec>.eyebrow::after{content:"";flex:1;height:1px;background:var(--line)}
.sec h2{font-size:22px;font-weight:800;letter-spacing:-.01em;margin:12px 0 6px}
.sec p{font-size:15px;line-height:1.72;color:#39424f;margin:10px 0;max-width:740px}
.sec p b{color:var(--ink)}
.callout{background:var(--soft);border:1px solid #e0e3f5;border-left:3px solid var(--accent);border-radius:12px;padding:14px 18px;margin:16px 0;font-size:14.5px;line-height:1.66;color:#33405c;max-width:760px}
.eq{font-size:17px;font-weight:750;color:var(--ink);text-align:center;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin:14px 0;line-height:1.7}
.eq .plus{color:var(--accent);font-weight:800;margin:0 6px}
.fig{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 16px 8px;margin:18px 0;box-shadow:0 1px 2px rgba(20,25,40,.04)}
.fig svg{width:100%;height:auto;display:block}
.fig figcaption{font-size:12.5px;color:var(--dim);text-align:center;padding:6px 8px 8px;line-height:1.5}
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:12px;margin:16px 0;max-width:820px}
.lcard{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:14px 16px;box-shadow:0 1px 2px rgba(20,25,40,.04)}
.lcard b{display:block;font-size:14px;margin-bottom:5px}
.lcard .vs{font-size:13px;color:var(--dim);line-height:1.5}
.lcard .vs em{color:var(--accent);font-style:normal;font-weight:700}
/* ---- comedy map ---- */
.mapwrap{display:flex;height:100%}
.famnav{flex:0 0 236px;overflow-y:auto;border-right:1px solid var(--line);background:var(--surface);padding:10px}
.famnav .lbl{font-size:10.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);padding:8px 10px}
.fbtn{display:flex;gap:10px;align-items:center;width:100%;text-align:left;border:1px solid transparent;background:none;font:inherit;padding:9px 10px;border-radius:10px;cursor:pointer;color:var(--dim);margin-bottom:2px}
.fbtn:hover{background:var(--soft);color:var(--ink)}
.fbtn.active{background:var(--soft);color:var(--ink);border-color:var(--accent);font-weight:700}
.fbtn .fic{font-size:16px;flex:0 0 auto}
.fbtn .fnm{flex:1;font-size:13.5px;line-height:1.2}
.fbtn .fct{font-size:11px;color:var(--accent);font-weight:800}
.mapcontent{flex:1;overflow-y:auto;padding:28px 34px 70px}
.mapcontent .fhead{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:10px}
.mapcontent h2.ft{font-size:27px;font-weight:850;letter-spacing:-.01em;margin:8px 0 2px;display:flex;align-items:center;gap:12px}
.mapcontent p.fd{font-size:15px;color:var(--dim);line-height:1.6;max-width:720px;margin:6px 0 22px}
.subgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.subcard{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:0 1px 2px rgba(20,25,40,.04)}
.subcard .sn{font-size:15.5px;font-weight:750;margin-bottom:6px}
.subcard .sdef{font-size:13.5px;color:#39424f;line-height:1.55}
.subcard .sex{font-size:13px;color:var(--dim);line-height:1.55;margin-top:9px;padding-top:9px;border-top:1px solid var(--line);font-style:italic}
.subcard .sex b{color:var(--accent);font-style:normal;font-weight:700;letter-spacing:.03em}
@media(max-width:900px){.mlayout{flex-direction:column;padding:22px 18px 80px}.mtoc{display:none}.mapwrap{flex-direction:column;height:auto}.famnav{flex:0 0 auto;border-right:0;border-bottom:1px solid var(--line);display:flex;flex-wrap:wrap;gap:6px}.fbtn{width:auto}}
</style></head><body>
<div class="happ">
 <header class="hbar"><div class="hbrand">😄 Humor Development</div><nav class="htabs" id="htabs"></nav></header>
 <div class="stage" id="stage"></div>
</div>
<script>
/* ===== diagram library (extracted from Concept Visualization Explorer) ===== */
__VIZLIB__
/* ===== data ===== */
var TAXO=__TAXO__;
var EMBEDS=__EMBEDS__;
(function(){
 var TABS=[["model","◎ The Model"],["map","🗺️ Comedy Map"],["expansion","Associative Expansion"],["wheel","Association Wheel"],["irony","Irony Lens"],["engine","Irony → Jokes"],["room","Engine Room"],["viz","Viz Toolkit"]];
 var EMBEDKEYS={expansion:1,wheel:1,irony:1,engine:1,room:1,viz:1};
 var TK="humor.tab.v1"; var tab="model"; try{tab=localStorage.getItem(TK)||"model";}catch(e){}
 if(!TABS.some(function(t){return t[0]===tab;}))tab="model";
 var stage=document.getElementById("stage");
 var blobCache={};
 function blobFor(key){ if(blobCache[key])return blobCache[key]; var b64=EMBEDS[key]; if(!b64)return null; try{var bin=atob(b64),arr=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);var u=URL.createObjectURL(new Blob([arr],{type:"text/html"}));blobCache[key]=u;return u;}catch(e){return null;} }
 function esc(t){return (t||"").replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
 function fig(svg,cap){return '<figure class="fig">'+svg+(cap?'<figcaption>'+esc(cap)+'</figcaption>':'')+'</figure>';}

 function renderTabs(){var el=document.getElementById("htabs");el.innerHTML="";TABS.forEach(function(t){var b=document.createElement("button");b.textContent=t[1];if(t[0]===tab)b.className="active";b.onclick=function(){show(t[0]);};el.appendChild(b);});}

 /* ---------------- THE MODEL ---------------- */
 function modelHTML(){
  var S={};
  S.venn=genVenn3([{label:"Meaningful\nTension",color:C.a1},{label:"Unexpected\nTwist",color:C.a4},{label:"Emotional\nSafety",color:C.a5}],{abc:"HUMOR"},"Humor = the overlap of all three",{w:640,h:520});
  S.pipe=genGraph([
    {id:"o",x:.5,y:.05,shape:"round",w:190,h:36,label:"Object / Situation",fill:C.a1},
    {id:"e",x:.5,y:.18,shape:"rect",w:190,h:34,label:"Associative Expansion",fill:C.a2},
    {id:"n",x:.5,y:.31,shape:"rect",w:190,h:34,label:"Interesting Node",fill:C.a2},
    {id:"m",x:.5,y:.44,shape:"rect",w:190,h:34,label:"Human Meaning",fill:C.a6},
    {id:"p",x:.5,y:.57,shape:"rect",w:190,h:34,label:"Human Psychology",fill:C.a6},
    {id:"t",x:.5,y:.70,shape:"rect",w:190,h:34,label:"Tension / Conflict",fill:C.a4},
    {id:"l",x:.5,y:.83,shape:"rect",w:190,h:34,label:"Comedy Lens",fill:C.a3},
    {id:"j",x:.5,y:.96,shape:"round",w:150,h:36,label:"Joke",fill:C.a5}
  ],[{from:"o",to:"e"},{from:"e",to:"n"},{from:"n",to:"m"},{from:"m",to:"p"},{from:"p",to:"t"},{from:"t",to:"l"},{from:"l",to:"j"}],{w:640,h:660});
  S.timeline=genTimeline([
    {when:"v0",label:"Situation → Joke"},
    {when:"v1",label:"+ Comedy Lens"},
    {when:"v2",label:"+ Associations"},
    {when:"v3",label:"+ Meaning / Psych"},
    {when:"v4",label:"+ Tension"},
    {when:"final",label:"3-part synthesis"}
  ],{w:820,h:250});
  S.chain=genGraph([
    {id:"a",x:.16,y:.08,shape:"round",w:150,h:34,label:"Toothbrush",fill:C.a1},
    {id:"b",x:.42,y:.26,shape:"rect",w:130,h:32,label:"Cleaning",fill:C.a2},
    {id:"c",x:.68,y:.44,shape:"rect",w:130,h:32,label:"Janitor",fill:C.a2},
    {id:"d",x:.44,y:.62,shape:"rect",w:170,h:32,label:"Underappreciated",fill:C.a6},
    {id:"e",x:.7,y:.80,shape:"rect",w:130,h:32,label:"Labour union",fill:C.a4},
    {id:"f",x:.4,y:.95,shape:"round",w:220,h:36,label:"“Toothbrushes on strike”",fill:C.a5}
  ],[{from:"a",to:"b"},{from:"b",to:"c"},{from:"c",to:"d"},{from:"d",to:"e"},{from:"e",to:"f"}],{w:700,h:520});
  S.spectrum=genSpectrum("Free / divergent","Anchored / orbiting",[
    {label:"→ Politics",pos:.13,color:C.a3},
    {label:"sweet spot",pos:.62,color:C.a1},
    {label:"→ Secrets",pos:.9,color:C.a5}
  ],{title:"Judge a chain by territory opened, not distance travelled",w:800,h:270});
  S.fish=genFishbone("A high-yield node",[
    {name:"People",causes:["status","conflict"]},
    {name:"Emotion",causes:["fear","shame","pride"]},
    {name:"Institutions",causes:["rules","power"]},
    {name:"Human life",causes:["relationships","ambition"]}
  ],{w:820,h:430});
  S.concentric=genConcentric([{label:"Object",color:C.a1},{label:"Function",color:C.a2},{label:"Meaning",color:C.a6},{label:"Psychology",color:C.a3}],{caption:"The depth path — physical world → emotional world",w:560,h:520});
  S.triad=genTriad([{label:"Meaning\n(the prize)",color:C.a1},{label:"Psychology\n(the reaction)",color:C.a3},{label:"Tension\n(the gap)",color:C.a4}],{ab:"stirs",bc:"opens",ca:"reveals"},"Comedy lives in the gap",{w:600,h:520});
  S.tree=genTree({label:"Master Association Engine",children:[
    {label:"Universal"},
    {label:"Object"},
    {label:"Character",children:[{label:"Wants"},{label:"Fears"},{label:"Flaws"}]},
    {label:"Relationship",children:[{label:"Power"},{label:"Tension"}]},
    {label:"Situation",children:[{label:"Goals"},{label:"Stakes"}]},
    {label:"Lens",children:[{label:"Irony"},{label:"Status"},{label:"Absurd"}]}
  ]},{w:860,h:470,boxW:96,boxH:34});
  S.mind=genMindMap("15 Association\nDirections",[
    {label:"Properties"},{label:"Opposites"},{label:"Causes"},{label:"Consequences"},{label:"Parts / Whole"},{label:"Similar"},{label:"Categories"},{label:"Metaphors"},{label:"Emotions"},{label:"Cultural"},{label:"Extremes"},{label:"Hypotheticals"},{label:"Time"}
  ],{w:800,h:560});
  S.curric=genPyramid([
    {label:"Full situations & lenses"},
    {label:"Contradictions / irony"},
    {label:"Mini-situations (character + goal)"},
    {label:"Actions (verbs)"},
    {label:"Relationships"},
    {label:"Characters & archetypes"},
    {label:"Objects / nouns"}
  ],{w:720,h:500});

  var lenses=[
    ["Irony","Expectation","Reality"],["Character","Self-image","Reality"],["Status","High status","Low status"],
    ["Absurdism","Normal","Impossible"],["Hyperbole","Reasonable","Extreme"]
  ].map(function(l){return '<div class="lcard"><b>'+esc(l[0])+'</b><div class="vs"><em>'+esc(l[1])+'</em> vs <em>'+esc(l[2])+'</em></div></div>';}).join("");

  var toc=[["synthesis","The equation"],["pipeline","The pipeline"],["chronology","How it evolved"],["twoskills","Two skills"],["chain","Node transfer"],["anchored","Anchored vs free"],["yield","High-yield nodes"],["depth","The depth path"],["meaning","Meaning vs psychology"],["tension","The tension layer"],["engine2","Master engine"],["directions","15 directions"],["curriculum","The curriculum"],["lenses","Every lens = a gap"],["fractal","Humor is fractal"]]
    .map(function(t){return '<a data-to="'+t[0]+'">'+esc(t[1])+'</a>';}).join("");

  return '<div class="mlayout"><div class="mmain">'
   +'<div class="hero"><div class="kick">The Model</div><h1>How I actually generate humor</h1>'
   +'<p class="sub">Not "be funny" — a repeatable pipeline, reverse-engineered from the ground up. This is the chronological build of my own understanding, from a naive one-step guess to a three-part synthesis.</p></div>'

   +sec("synthesis","The final equation","Where it all landed",
       '<div class="eq">Humor <span class="plus">=</span> Humanly Meaningful Tension <span class="plus">+</span> Unexpected Twist <span class="plus">+</span> Emotional Safety</div>'
       +'<p>Every earlier model was a longer pipeline. This is the compression: comedy needs <b>tension that matters to humans</b>, a <b>twist</b> that resolves it unexpectedly, and enough <b>safety</b> that the surprise reads as play, not threat. Remove any one and it stops being funny.</p>'
       +fig(S.venn))

   +sec("pipeline","The pipeline I run","The working machine",
       '<p>When I sit with an object or a situation, this is the path I walk. Each arrow is a place I can get stuck — and each is trainable on its own.</p>'
       +fig(S.pipe,"Object → Expansion → Node → Meaning → Psychology → Tension → Lens → Joke"))

   +sec("chronology","How the model evolved","Chronology",
       '<p>I didn\'t start here. The model grew one layer at a time — each time I thought I\'d hit bedrock, another layer appeared underneath.</p>'
       +fig(S.timeline,"Every version added the missing layer the previous one skipped"))

   +sec("twoskills","Two different skills","The split",
       '<p>What I lumped together as "association" is really <b>two operations</b>. <b>Expansion</b> generates branches from one node. <b>Node transfer</b> picks a branch, makes it the new centre, and expands again. Expansion alone stays shallow; the good material is several transfers away.</p>')

   +sec("chain","The chain reaches the premise","Node transfer",
       '<p>The premise usually doesn\'t exist in the original object. It <b>emerges</b> after a few transfers. A toothbrush isn\'t funny — but follow the chain and a comedy premise appears that was nowhere near the start.</p>'
       +fig(S.chain,"The premise emerges several node-transfers from the observation"))

   +sec("anchored","Anchored beats free","Which chain to follow",
       '<p>Free association drifts — pillow → politics, and the pillow is gone. <b>Anchored</b> association keeps orbiting the original, so every node stays usable. Don\'t judge a chain by how far it travels; judge it by how much interesting territory it opens.</p>'
       +fig(S.spectrum))

   +sec("yield","High-yield nodes","Where the material hides",
       '<p>Not all nodes are equal. Some explode into people, status, emotion, institutions and conflict; some die in a category. Learn to feel which nodes are fertile — those are where the richest comedy hides.</p>'
       +fig(S.fish,"Fertile nodes branch into inherently human things"))

   +sec("depth","The depth path","Physical → emotional",
       '<p>Objects themselves are rarely funny — <b>human reactions to what they represent</b> are. So I keep pushing inward: from the thing, to what it does, to what it means, to how people feel about that meaning.</p>'
       +fig(S.concentric))

   +sec("meaning","Meaning vs psychology","The boundary",
       '<p><b>Meaning</b> is what people <b>want</b> (freedom, status, identity, security). <b>Psychology</b> is what people <b>feel</b> about it (pride, insecurity, fear, shame). Quick test: could it title a life goal, or an emotional state? Comedy often begins right on that boundary — the meaning someone chases and the flaw that sabotages them.</p>'
       +'<div class="callout">Sitcom engines live in this gap. George wants <b>status</b>, feels <b>insecurity</b>. Michael wants <b>recognition</b>, feels <b>neediness</b>. Ross wants <b>attractiveness</b>, feels <b>insecurity</b>.</div>')

   +sec("tension","The tension layer","The missing step",
       '<p>Psychology alone is just a state — not funny. Comedy appears when it <b>collides</b> with something: desire vs reality, self-image vs truth. The lens doesn\'t create the tension; the tension already exists — the lens reveals, exaggerates, inverts or escalates it.</p>'
       +fig(S.triad))

   +sec("engine2","One master engine","The tree",
       '<p>Under everything is a single associative engine. Universal directions work on anything; then each kind of thing — object, character, relationship, situation, lens — grows its own specialised questions on top.</p>'
       +fig(S.tree,"Universal directions + domain-specific + comedy-lens branches"))

   +sec("directions","The 15 directions","Where can I move?",
       '<p>The universal expansion directions — the physics of associative thinking. They don\'t care what the thing is.</p>'
       +fig(S.mind))

   +sec("curriculum","The curriculum","Train it in order",
       '<p>Build from the ground up so you\'re never learning irony and expansion at once. Master the base, and the higher tiers become much easier because the expansion engine is already there.</p>'
       +fig(S.curric,"Foundations at the base; lenses only once expansion is fluent"))

   +sec("lenses","Every lens is a gap","The one move",
       '<p>The lenses look different but run the same move: find a gap and exploit it. Each one just fixes <b>which</b> gap to stare at.</p>'
       +'<div class="lgrid">'+lenses+'</div>')

   +sec("fractal","Humor is fractal","Stop the regression",
       '<p>Every time it feels like bedrock, another layer waits below — status, archetypes, narrative, evolutionary psychology. You don\'t need the whole tree to be funny. The model is already good enough; from here the bottleneck isn\'t the map, it\'s <b>mileage</b>. Enough reps and the layers collapse back into a single instinct.</p>')

   +'</div><aside class="mtoc"><div class="tl">On this page</div>'+toc+'</aside></div>';
 }
 function sec(id,title,eyebrow,body){return '<section class="sec" id="'+id+'"><div class="eyebrow">'+esc(eyebrow)+'</div><h2>'+esc(title)+'</h2>'+body+'</section>';}

 /* ---------------- COMEDY MAP ---------------- */
 var famSel=0;
 function mapHTML(){
  var nav='<div class="lbl">11 Families</div>'+TAXO.map(function(f,i){return '<button class="fbtn'+(i===famSel?' active':'')+'" data-fam="'+i+'"><span class="fic">'+f.ic+'</span><span class="fnm">'+esc(f.n)+'</span><span class="fct">'+f.subs.length+'</span></button>';}).join("");
  return '<div class="mapwrap"><nav class="famnav" id="famnav">'+nav+'</nav><main class="mapcontent" id="mapcontent">'+famContent()+'</main></div>';
 }
 function famContent(){var f=TAXO[famSel];
  var cards=f.subs.map(function(s){return '<div class="subcard"><div class="sn">'+esc(s.n)+'</div><div class="sdef">'+esc(s.def)+'</div>'+(s.ex?'<div class="sex"><b>e.g.</b> '+esc(s.ex)+'</div>':'')+'</div>';}).join("");
  return '<div class="fhead">Family '+(famSel+1)+' of '+TAXO.length+'</div><h2 class="ft"><span>'+f.ic+'</span>'+esc(f.n)+'</h2><p class="fd">'+esc(f.desc)+'</p><div class="subgrid">'+cards+'</div>';
 }

 /* ---------------- render / tabs ---------------- */
 function show(key){
  tab=key; try{localStorage.setItem(TK,key);}catch(e){}
  renderTabs();
  if(EMBEDKEYS[key]){ stage.className="stage embed"; var u=blobFor(key); stage.innerHTML=u?'<iframe class="frame" title="'+esc(key)+'" src="'+u+'"></iframe>':'<div style="padding:40px;color:#5b6472">Content unavailable.</div>'; return; }
  stage.className="stage";
  if(key==="map"){ stage.innerHTML=mapHTML(); }
  else { stage.innerHTML=modelHTML(); stage.scrollTop=0; }
 }
 stage.addEventListener("click",function(e){var t=e.target;
   var toc=t.closest?t.closest("[data-to]"):null; if(toc){var el=document.getElementById(toc.getAttribute("data-to"));if(el)el.scrollIntoView({behavior:"smooth",block:"start"});return;}
   var fb=t.closest?t.closest("[data-fam]"):null; if(fb){famSel=parseInt(fb.getAttribute("data-fam"),10);document.getElementById("famnav").innerHTML='<div class="lbl">11 Families</div>'+TAXO.map(function(f,i){return '<button class="fbtn'+(i===famSel?' active':'')+'" data-fam="'+i+'"><span class="fic">'+f.ic+'</span><span class="fnm">'+esc(f.n)+'</span><span class="fct">'+f.subs.length+'</span></button>';}).join("");var mc=document.getElementById("mapcontent");if(mc){mc.innerHTML=famContent();mc.scrollTop=0;}return;}
 });
 renderTabs(); show(tab);
})();
</script></body></html>
